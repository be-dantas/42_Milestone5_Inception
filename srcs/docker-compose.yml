#version: "3.8"

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - network_inception
    secrets:
      - db_password
      - db_root_password
      - db_user

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: always
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - network_inception
    depends_on:
      - mariadb
    secrets:
      - db_password
      - db_user

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: always
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - network_inception
    depends_on:
      - wordpress
    ports:
      - "443:443"
#ports: porta da minha máquina : porta do container, pois nginx é o unico que precisa de acesso externo

#espaço de armazenamento persistente fora do container
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      device: /home/bedantas/data/mariadb
      o: bind

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: /home/bedantas/data/wordpress
      o: bind

networks:
  network_inception:
    name: network_inception

secrets:
  db_password:
    file: ../secrets/db_password.txt

  db_root_password:
    file: ../secrets/db_root_password.txt

  db_user:
    file: ../secrets/db_user.txt