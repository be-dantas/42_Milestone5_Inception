version: "3.8"

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - network_inception

  # nginx:
    # ...

  # wordpress:
    # ...

#espaço de armazenamento persistente fora do container
volumes:
  mariadb_data:
    # ...

networks:
  network_inception:
